name: biche-storyboard

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: biche_storyboard
      POSTGRES_USER: biche
      POSTGRES_PASSWORD: biche
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biche -d biche_storyboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    command: celery -A app.workers.celery_app.celery_app worker -Q prompt.optimize,image.generate,video.generate,provider.polling,feishu.backfill,archive --loglevel=INFO
    depends_on:
      - postgres
      - redis
      - minio

volumes:
  postgres_data:
  minio_data:
